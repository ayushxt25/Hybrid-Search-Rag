name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: quality-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      API_AUTH_ENABLED: "false"
      READINESS_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Check formatting
        run: python -m ruff format --check backend
      - name: Lint
        run: python -m ruff check backend
      - name: Run tests
        run: python -m pytest

  container-build:
    name: container-build
    runs-on: ubuntu-latest
    needs: quality-and-tests
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          APP_NAME=Hybrid Search RAG
          APP_VERSION=0.1.0
          ENVIRONMENT=ci
          API_V1_PREFIX=/api/v1
          LOG_LEVEL=INFO
          OBSERVABILITY_ENABLED=true
          READINESS_ENABLED=false
          SECURITY_HEADERS_ENABLED=true
          TRUSTED_HOSTS=["localhost","127.0.0.1","api","testserver"]
          CORS_ENABLED=false
          CORS_ALLOWED_ORIGINS=[]
          CORS_ALLOW_CREDENTIALS=false
          MAX_JSON_REQUEST_BYTES=262144
          MAX_DOCUMENT_UPLOAD_BYTES=10485760
          API_AUTH_ENABLED=false
          API_AUTH_HEADER_NAME=X-API-Key
          API_AUTH_PROTECT_SEARCH=true
          QDRANT_URL=http://qdrant:6333
          QDRANT_COLLECTION_NAME=internal_document_chunks
          QDRANT_HYBRID_COLLECTION_NAME=internal_document_chunks_hybrid
          QDRANT_HEALTH_TIMEOUT_SECONDS=3.0
          DENSE_EMBEDDING_DIMENSIONS=384
          HYBRID_DENSE_WEIGHT=1.5
          HYBRID_SPARSE_WEIGHT=1.0
          HYBRID_RRF_K=60
          CONTEXT_MAX_CHARACTERS=12000
          CONTEXT_MAX_SOURCES=8
          CONTEXT_INCLUDE_METADATA_HEADERS=true
          PROMPT_MAX_QUESTION_CHARACTERS=2000
          PROMPT_REQUIRE_CITATIONS=true
          PROMPT_ALLOW_GENERAL_KNOWLEDGE=false
          GENERATION_REQUIRE_ANSWER_CITATIONS=true
          OPENAI_API_KEY=
          OPENAI_BASE_URL=
          OPENAI_GENERATION_MODEL=gpt-4.1-mini
          OPENAI_GENERATION_TIMEOUT_SECONDS=30
          OPENAI_GENERATION_MAX_RETRIES=2
          GROUNDED_ANSWER_RATE_LIMIT_ENABLED=true
          GROUNDED_ANSWER_RATE_LIMIT_REQUESTS=10
          GROUNDED_ANSWER_RATE_LIMIT_WINDOW_SECONDS=60
          EOF
      - name: Validate Compose configuration
        run: docker compose config
      - name: Build API image
        run: docker build --tag hybrid-search-rag-ci:local .
      - name: Remove CI environment file
        if: always()
        run: rm -f .env
