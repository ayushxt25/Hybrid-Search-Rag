services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-search-rag-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_HYBRID_COLLECTION_NAME: ${QDRANT_HYBRID_COLLECTION_NAME:-internal_document_chunks_hybrid}
      TRUSTED_HOSTS: '${TRUSTED_HOSTS:-["localhost","127.0.0.1","api","frontend","testserver"]}'
      HF_HOME: /home/appuser/.cache/huggingface
    ports:
      # Local API port. Put a reverse proxy or platform load balancer in front for public deployment.
      - "8000:8000"
    tmpfs:
      - /tmp
    volumes:
      - huggingface_cache:/home/appuser/.cache/huggingface
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
    container_name: hybrid-search-studio-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Local frontend port for the unprivileged nginx container.
      - "3000:8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hybrid-search-rag-qdrant
    restart: unless-stopped
    ports:
      # Local-only Qdrant ports. Do not expose these publicly in production.
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      # Persistent Qdrant vector data.
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  # Cached embedding model files for local/container reuse.
  huggingface_cache:
  # Persistent Qdrant storage volume.
  qdrant_storage:
